<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyHub — {% block title %}{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f0f4f8; }
        .navbar-brand { font-weight: bold; font-size: 1.4rem; }
        .badge-pending  { background-color: #ffc107; color: #000; }
        .badge-approved { background-color: #198754; }
        .badge-rejected { background-color: #dc3545; }
    </style>
</head>
<body>

<!-- ── Navigation Bar ── -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🔷 VerifyHub</a>
        <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
                <a class="nav-link" href="/dashboard/">Dashboard</a>
                <a class="nav-link" href="/upload/">Upload Proof</a>
                <a class="nav-link" href="/review/">Review Queue</a>
                <a class="nav-link" href="/profile/{{ user.username }}/">My Profile</a>
                <a class="nav-link text-warning" href="/logout/">Logout ({{ user.username }})</a>
            {% else %}
                <a class="nav-link" href="/login/">Login</a>
                <a class="nav-link" href="/register/">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- ── Flash Messages ── -->
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
</div>

<!-- ── Page Content ── -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- jQuery (for AJAX voting) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Chart.js (for skill radar) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
