{% extends 'core/base.html' %}
{% block title %}Upload Proof{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm p-4">
            <h4>📤 Upload a Skill Artifact</h4>
            <p class="text-muted">Attach a PDF or file as proof for a skill you want verified.</p>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Skill</label>
                    {{ form.skill }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    {{ form.title }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Upload File (PDF recommended)</label>
                    {{ form.file }}
                </div>
                <button type="submit" class="btn btn-success w-100">Submit for Review</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
